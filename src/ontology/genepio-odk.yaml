id: genepio
title: Genomic Epidemiology Ontology
description: The Genomic Epidemiology Ontology aims to provide a comprehensive controlled vocabulary for infectious disease surveillance and outbreak investigations. It is an application ontology that draws on many other ontologies including anatomy, taxonomy, disease, symptoms, environment and food types for foodborn pathogen metadata.
contact:  info [at] genepio [.] org
creators:
  - Centre for Infectious Disease Genomics and One Health, SFU.ca
license: https://creativecommons.org/licenses/by/4.0/

## general ODK Settings ##
repo: genepio
git_main_branch: master
github_org: GenEpiO
ci:
  - github_actions
documentation:
  documentation_system: mkdocs  
export_formats:
  - owl
reasoner: ELK
release_artefacts:
  - base
  - full
#  - simple
primary_release: full
edit_format: ofn
use_templates: TRUE
use_context: TRUE # Enables standard prefixes.

#report_fail_on: ERROR
#report_fail_on: None
robot_report:
  fail_on: None
#  custom_profile: TRUE
  report_on:
    - genepio-base.owl
##   - simple ##


components:
  products:
# Note that for some products, if they have makefile template processing then only use .owl suffix for them
    - filename: deprecation.ofn
    - filename: gazetteer.ofn
    - filename: gaz_insdc_mapping.ofn
    - filename: hardcoded.ofn

# ROBOT CONTROLLED TEMPLATES, see https://obofoundry.org/COB/odk-workflows/RepoManagement/#adding-a-new-component-based-on-a-robot-template
# CURRENT ODK BUG: Makefile hardcoded some .owl commands; it can't apply robot
# to .ofn files. But one can use ofn files which have .owl suffix!
# Issue: while a generic component/specification.owl entry gets put in 
# catalog-v001.xml this doesn't include version.  Yet robot writes a version
# id line into specification.owl . Neither are automatically put into 
# genepio-edit.owl , which means Protege doesn't load specification.owl after 
# a "make".  User must manually set up non-version component import directly 
# using a text editor into genepio-edit.ofn:
#    <uri name="http://purl.obolibrary.org/obo/genepio/components/specification.owl" uri="components/specification.owl" />
# Problem is that trying to attach this import file via Protege UI includes
# version string info in name above, which works for the day that the "make"
# was done but not subsequent days.  Thus this has to be deleted and
# reestablished with each change in version (varies by datestamp). 
#
# Template_options: --input genepio-edit.owl to get lookup for object 
# properties like 'mentions' and 'is about' and annotations.  If this file 
# doesn't have them then "make" robot step spits out errors like 
# http://robot.obolibrary.org/template#annotation-property-error
    - filename: specification.owl
      use_template: TRUE
      template_options: --input genepio-edit.ofn --xml-entities --ontology-iri "http://purl.obolibrary.org/obo/genepio/components/specification.owl"
      templates: 
        - specification.tsv
        - specification_enum.tsv
        - specification_field.tsv
        - specification_mint.tsv
        - temporary_mint.tsv

import_group:
  annotation_properties:
    - rdfs:label
    - dc:description
    - dc:source
    - OBI:0001886
    - oboInOwl:hasAlternativeId
    - owl:deprecated
    - IAO:0000115
    - IAO:0000114
    - IAO:0000119
    - IAO:0000111
    - IAO:0100001 # replaced by

  products:

    - id: ro
      module_type: filter

    - id: obi
      module_type: filter

    - id: chebi
      use_custom_import_module: TRUE

    - id: ncbitaxon
      use_custom_import_module: TRUE

    - id: general
      use_custom_import_module: TRUE


robot_java_args: -Xmx2048m
