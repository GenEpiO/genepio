id: genepio
title: Genomic Epidemiology Ontology
github_org: GenEpiO
repo: genepio
release_artefacts:
  - base
  - full
#  - simple
primary_release: full
edit_format: ofn
use_templates: TRUE
export_formats:
  - owl
ci:
  - github_actions
documentation:
  documentation_system: mkdocs
reasoner: ELK
#report_fail_on: ERROR
#report_fail_on: None
robot_report:
  fail_on: None
#  custom_profile: TRUE
  report_on:
    - genepio-base.owl
release_artefacts:
  - base
  - full
